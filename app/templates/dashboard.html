<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherry Shop Admin</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <!-- LOGO -->
            <div class="sidebar__logo">
                <img src="{{ url_for('static', filename='img/logo/cherry-logo.png') }}" alt="Cherry Shop">
            </div>
            <!-- MENU -->
            <nav class="sidebar__nav">
                <a href="#" class="sidebar__item sidebar__item--active">
                    <span class="sidebar__icon">
                        <i class="ph ph-house"></i>
                    </span>
                    Dashboard
                </a>
                <a href="#" class="sidebar__item">
                    <span class="sidebar__icon">
                        <i class="ph ph-package"></i>
                    </span>
                    Produtos
                </a>
                <a href="#" class="sidebar__item">
                    <span class="sidebar__icon">
                        <i class="ph ph-shopping-cart"></i>
                    </span>
                    Pedidos
                </a>
                <a href="#" class="sidebar__item">
                    <span class="sidebar__icon">
                        <i class="ph ph-users-three"></i>
                    </span>
                    Clientes
                </a>
                <a href="#" class="sidebar__item">
                    <span class="sidebar__icon">
                        <i class="ph ph-tag"></i>
                    </span>
                    Promoções
                </a>
                <a href="#" class="sidebar__item">
                    <span class="sidebar__icon">
                        <i class="ph ph-gear"></i>
                    </span>
                    Configurações
                </a>
                <a href="#" class="sidebar__item">
                    <span class="sidebar__icon">
                        <i class="ph ph-chart-line-up"></i>
                    </span>
                    Relatórios
                </a>
                <a href="#" class="sidebar__item">
                    <span class="sidebar__icon">
                        <i class="ph ph-chat-circle-text"></i>
                    </span>
                    Mensagens
                </a>
                <a href="#" class="sidebar__item">
                    <span class="sidebar__icon">
                        <i class="ph ph-megaphone"></i>
                    </span>
                    Marketing
                </a>
                <a href="#" class="sidebar__item">
                    <span class="sidebar__icon">
                        <i class="ph ph-lifebuoy"></i>
                    </span>
                    Ajuda & Suporte
                </a>
            </nav>
            <!-- FOOTER SIDEBAR -->
            <div class="sidebar__footer">
                <div class="sidebar__profile">
                    <img src="{{ url_for('static', filename='img/users/admin-maria.jpeg') }}" alt="Admin Maria">
                    <span>Admin Maria</span>
                </div>
                <button class="sidebar__logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Sair
                </button>
            </div>
        </aside>
        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1>Painel Administrativo</h1>
                <div class="dashboard-header__actions">
                    <button class="header-circle-btn">
                        <i class="ph ph-magnifying-glass"></i>
                    </button>
                    <button class="header-circle-btn notification-btn">
                        <i class="ph ph-bell"></i>
                        <span class="notification-badge">3</span>
                    </button>
                    <button class="profile-dropdown">
                        <img src="{{ url_for('static', filename='img/users/admin-maria.jpeg') }}" alt="Admin">
                        <span>Admin Maria</span>
                        <i class="ph ph-caret-down"></i>
                    </button>
                </div>
            </header>
            <section class="welcome-banner">
                <div class="welcome-banner__left">
                    <img src="{{ url_for('static', filename='img/icons/cherry.png') }}" alt="Cherry Icon">
                    <div class="welcome-banner__text">
                        <span>Olá, Admin!</span>
                        <small>Bem-vindo(a) ao Cherry Shop!</small>
                    </div>
                </div>
                <div class="welcome-banner__actions">
                    <button class="btn-add-product">
                        Adicionar Produto
                    </button>
                    <button class="btn-manage">
                        Gerenciar
                    </button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
